{% extends 'base.html' %}
{% block content %}
<h1 class="light" style="text-align: center;">This is Book page</h1>
<div class="row">
    {% for book in books %}
    <div class="col">
        <div class="card bg-dark text-white" style="width: 18rem;">
            <img src="/static/images/{{ book.image }}" class="card-img-top" alt="Book Poster Image">
            <div class="card-body">
                <h4 class="card-title">{{ book.title }}</h4>
                <h5 class="card-title">{{ book.author }}</h5>
                <p class="card-text">{{ book.release_year }}</p>
                <a href="/book/{{ book.id }}" class="btn btn-primary">See details</a>
                {% if current_user.role == "Admin" %}
                <a href="/delete_book/{{ book.id }}" class="btn btn-danger">Delete Book</a>
                <a href="/update_book/{{ book.id }}" class="btn btn-info mt-2">Update Book</a>
                {% endif %}
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
